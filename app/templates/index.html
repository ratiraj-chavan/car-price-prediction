<!DOCTYPE html>
<html>
<head>
<title>Car-lo | Car Price Predictor</title>

<style>

body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    width:420px;
    padding:35px;
    border-radius:16px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.45);
}

h2{
    text-align:center;
    font-weight:600;
    margin-bottom:25px;
    color:#0f172a;
}

label{
    font-size:13px;
    font-weight:500;
    color:#334155;
}

input{
    width:100%;
    padding:10px 12px;
    margin-top:6px;
    margin-bottom:16px;
    border:1px solid #e2e8f0;
    border-radius:8px;
    font-size:14px;
    transition:0.2s;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}


.button-group{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:11px;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}


.predict-btn{
    background:#2563eb;
    color:white;
}

.predict-btn:hover{
    background:#1d4ed8;
}


.reset-btn{
    background:#e2e8f0;
    color:#334155;
}

.reset-btn:hover{
    background:#cbd5f5;
}

.result{
    margin-top:25px;
    padding:14px;
    border-radius:10px;
    text-align:center;
    background:#f1f5f9;
}

.result h3{
    margin:0;
    color:#059669;
    font-weight:700;
}

.footer{
    text-align:center;
    font-size:12px;
    margin-top:18px;
    color:#64748b;
}

</style>

<script>

function resetForm(){

    document.querySelectorAll("input").forEach(input=>{
        input.value="";
    });

    const result=document.querySelector(".result h3");
    if(result){
        result.innerText="";
    }

    window.location.href="/";
}

</script>

</head>

<body>

<div class="container">

<h2>🚗 Car-lo Price Predictor</h2>

<form action="/predict" method="post">

<label>Vehicle Age</label>
<input type="number" name="vehicle_age"
value="{{ request.form.vehicle_age if request.form.vehicle_age else '' }}" required>

<label>KM Driven</label>
<input type="number" name="km_driven"
value="{{ request.form.km_driven if request.form.km_driven else '' }}" required>

<label>Mileage (km/l)</label>
<input type="text" name="mileage"
value="{{ request.form.mileage if request.form.mileage else '' }}" required>

<label>Engine CC</label>
<input type="number" name="engine"
value="{{ request.form.engine if request.form.engine else '' }}" required>

<label>Max Power (bhp)</label>
<input type="text" name="max_power"
value="{{ request.form.max_power if request.form.max_power else '' }}" required>

<label>Seats</label>
<input type="number" name="seats"
value="{{ request.form.seats if request.form.seats else '' }}" required>

<div class="button-group">
<button type="submit" class="predict-btn">Predict</button>
<button type="button" class="reset-btn" onclick="resetForm()">Reset</button>
</div>

</form>

<div class="result">
<h3>{{ prediction_text }}</h3>
</div>

<div class="footer">
Car-lo AI • Used Car Price Estimator
</div>

</div>

</body>
</html>
